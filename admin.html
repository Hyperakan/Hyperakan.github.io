<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Admin</title>

<style>
body{
font-family:Arial;
max-width:500px;
margin:auto;
padding:10px;
}

img{
max-width:100%;
}

.card{
border:1px solid #ccc;
padding:10px;
margin:10px 0;
}
</style>
</head>

<body>

<h2>Yüklenenler</h2>

<div id="posts">
yükleniyor...
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

var db=
supabase.createClient(
"https://jzsavjbjbwdqcswkyayv.supabase.co",
"sb_publishable_n81KiQgIF7qFJhyR1T8GEA_jInAKK7P"
);

var password=
location.hash
.replace("#","");

if(!password){

document
.getElementById("posts")
.innerHTML=
"şifre yok";

throw "no password";

}

loadPosts();

async function loadPosts(){

var res=
await db.rpc(
"get_private_posts",
{
input_password:
password
}
);

if(res.error){

document
.getElementById("posts")
.innerHTML=
res.error.message;

return;

}

document
.getElementById("posts")
.innerHTML=
res.data.map(
function(p){

return `
<div class="card">

<b>${escapeHtml(
p.name||""
)}</b>

<p>${escapeHtml(
p.note||""
)}</p>

${p.photo_url
?
`<img src="${p.photo_url}">`
:
""
}

</div>
`;

}).join("");

}

function escapeHtml(text){

return String(text)
.replace(
/[&<>"']/g,
function(m){

return{
"&":"&amp;",
"<":"&lt;",
">":"&gt;",
'"':"&quot;",
"'":"&#039;"
}[m];

});

}

</script>

</body>
</html>
