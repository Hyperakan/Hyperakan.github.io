<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Yükleme</title>

<style>
body{font-family:Arial;max-width:450px;margin:auto;padding:10px}
input,textarea,button{
width:100%;
margin:6px 0;
padding:8px;
font-size:16px;
box-sizing:border-box;
}
</style>
</head>

<body>

<h2>Not / Foto Gönder</h2>

<input id="name" placeholder="İsim">

<textarea
id="note"
rows="4"
placeholder="Not yaz">
</textarea>

<input
id="photo"
type="file"
accept="image/*">

<button onclick="uploadPost()">
Yükle
</button>

<p id="status"></p>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

var db =
supabase.createClient(
"https://jzsavjbjbwdqcswkyayv.supabase.co",
"sb_publishable_n81KiQgIF7qFJhyR1T8GEA_jInAKK7P"
);

async function compressImage(file){

return new Promise(function(resolve){

var img=new Image();
var reader=new FileReader();

reader.onload=function(e){

img.onload=function(){

var max=320;

var w=img.width;
var h=img.height;

if(w>h&&w>max){
h=Math.round(h*max/w);
w=max;
}
else if(h>max){
w=Math.round(w*max/h);
h=max;
}

var canvas=
document.createElement("canvas");

canvas.width=w;
canvas.height=h;

canvas
.getContext("2d")
.drawImage(img,0,0,w,h);

canvas.toBlob(
function(blob){
resolve(blob);
},
"image/jpeg",
0.45
);

};

img.src=e.target.result;
};

reader.readAsDataURL(file);

});

}

async function uploadPost(){

var name =
document
.getElementById("name")
.value;

if(!name){
alert("İsim gir");
return;
}

var note =
document
.getElementById("note")
.value;

var file =
document
.getElementById("photo")
.files[0];

document
.getElementById("status")
.innerHTML="yükleniyor...";

var photoUrl="";

if(file){

var small=
await compressImage(file);

var filename=
Date.now()+".jpg";

var upload=
await db.storage
.from("photos")
.upload(
filename,
small,
{
contentType:
"image/jpeg"
}
);

if(upload.error){
alert(upload.error.message);
return;
}

photoUrl=
db.storage
.from("photos")
.getPublicUrl(filename)
.data.publicUrl;

}

var insert=
await db
.from("posts")
.insert({
name:name,
note:note,
photo_url:photoUrl
});

if(insert.error){
alert(insert.error.message);
return;
}

document
.getElementById("status")
.innerHTML="Gönderildi.";

document
.getElementById("name")
.value="";

document
.getElementById("note")
.value="";

document
.getElementById("photo")
.value="";
}

</script>

</body>
</html>
